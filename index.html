<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سایت SENATOR</title>
    <style>
        /* اینجا کد CSS میاد */
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 100px 20px;
            margin: 0;
            direction: rtl;
        }
        h1 {
            font-size: 4em;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
        }
        p {
            font-size: 1.5em;
            color: #a8a8a8;
        }
        button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2em;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            background: #ee5a24;
        }
    </style>
</head>
<body>
    <h1>🚀 سلام! من SENATOR هستم</h1>
    <p>به سایت شخصی من خوش آمدید</p>
    <button id="myButton">رو من کلیک کن!</button>

    <script>
        // اینجا کد جاوااسکریپت میاد
        document.getElementById("myButton").addEventListener("click", function() {
            alert("سلام! خوش اومدی به سایت من 😎");
        });
    </script>
</body>
</html>
